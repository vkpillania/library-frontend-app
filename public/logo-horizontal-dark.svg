<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" width="280" height="50" role="img" aria-label="The Library">
  <!-- Compact open book mark - light version for dark backgrounds -->
  <g transform="translate(28, 25)">
    <path d="M -22,2 L -22,14 L 0,17 L 22,14 L 22,2 L 0,5 Z" 
          fill="none" stroke="#F5F1E8" stroke-width="1.6" stroke-linejoin="round"/>
    
    <path d="M -24,0 L -22,2 L -22,14 L -24,16 Z" fill="#F5F1E8"/>
    <path d="M 24,0 L 22,2 L 22,14 L 24,16 Z" fill="#F5F1E8"/>
    
    <line x1="0" y1="5" x2="0" y2="17" stroke="#F5F1E8" stroke-width="1"/>
    
    <line x1="-18" y1="6" x2="-4" y2="8" stroke="#7A8471" stroke-width="0.6"/>
    <line x1="-18" y1="10" x2="-4" y2="12" stroke="#7A8471" stroke-width="0.6"/>
    <line x1="4" y1="8" x2="18" y2="6" stroke="#7A8471" stroke-width="0.6"/>
    <line x1="4" y1="12" x2="18" y2="10" stroke="#7A8471" stroke-width="0.6"/>
    
    <rect x="-1" y="5" width="2" height="18" fill="#C84A31"/>
  </g>
  
  <text x="68" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#F5F1E8">The Library</text>
  <text x="68" y="42" font-family="'Courier New', monospace" font-size="8" font-weight="700" fill="#7A8471" letter-spacing="1.5">A LENDING COLLECTION</text>
</svg>
